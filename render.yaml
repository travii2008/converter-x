services:
  - type: web
    name: converter-x-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: tmp-storage
      mountPath: /tmp
      sizeGB: 1